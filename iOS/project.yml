name: Tripcompanion
options:
  bundleIdPrefix: com.shimondeitel.tripcompanion
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Tripcompanion:
    type: application
    platform: iOS
    sources:
      - path: Tripcompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tripcompanion
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Tripcompanion/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TripcompanionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TripcompanionTests
      - path: Tripcompanion.storekit
    dependencies:
      - target: Tripcompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tripcompanion.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TripcompanionUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TripcompanionUITests
    dependencies:
      - target: Tripcompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tripcompanion.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Tripcompanion:
    build:
      targets:
        Tripcompanion: all
        TripcompanionTests: [test]
        TripcompanionUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Tripcompanion.storekit
    test:
      config: Debug
      storeKitConfiguration: Tripcompanion.storekit
      targets:
        - TripcompanionTests
        - TripcompanionUITests
    archive:
      config: Release
